<!DOCTYPE html>
<html>

<head>
    <title>Clipper Crew // Backrooms Online</title>

    <style>
        body {
            margin: 0;
            font-family: monospace;
            background: #b8b15a;
        }

        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                #b8b15a,
                #b8b15a 25px,
                #a59f50 25px,
                #a59f50 50px
            );
            z-index: -1;
        }

        .hub {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            height: 100vh;
        }

        .panel {
            border: 1px solid black;
            background: rgba(0,0,0,0.15);
            padding: 10px;
            overflow-y: auto;
        }

        input, button {
            width: 90%;
            padding: 8px;
            margin-top: 5px;
            background: #111;
            color: #d6d06a;
            border: none;
        }

        .chatBox {
            height: 75vh;
            overflow-y: auto;
            border: 1px solid black;
            padding: 5px;
        }

        .hidden { display: none; }

        .msg { margin: 4px 0; }
    </style>
</head>

<body>

<div class="bg"></div>

<!-- LOGIN -->
<div id="login" style="text-align:center; margin-top:120px;">
    <h1>CLIPPER CREW</h1>

    <input id="email" placeholder="email"><br>
    <input id="pass" type="password" placeholder="password"><br>

    <button onclick="signup()">register</button>
    <button onclick="signin()">login</button>

    <p id="msg"></p>
</div>

<!-- HUB -->
<div id="hub" class="hub hidden">

    <div class="panel">
        <h3>ONLINE</h3>
        <div id="online"></div>
    </div>

    <div class="panel">
        <h3>GLOBAL CHAT</h3>

        <div class="chatBox" id="chat"></div>

        <input id="text" placeholder="message">
        <button onclick="send()">send</button>
    </div>

    <div id="adminPanel" class="panel hidden">
        <h3>ADMIN PANEL</h3>
        <button onclick="clearChat()">wipe chat</button>
        <button onclick="wipeOnline()">wipe online</button>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    setDoc,
    doc,
    deleteDoc,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 PUT REAL FIREBASE CONFIG HERE */
const firebaseConfig = {
    apiKey: "PASTE_REAL",
    authDomain: "PASTE_REAL",
    projectId: "PASTE_REAL",
    storageBucket: "PASTE_REAL",
    messagingSenderId: "PASTE_REAL",
    appId: "PASTE_REAL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* DOM FIX (VERY IMPORTANT) */
const email = document.getElementById("email");
const pass = document.getElementById("pass");
const text = document.getElementById("text");
const chat = document.getElementById("chat");
const online = document.getElementById("online");
const msg = document.getElementById("msg");

/* ADMINS */
const ADMIN_EMAILS = [
    "mcfly200976@gmail.com",
    "lgilley2028@jpkeefehs.org"
];

/* FORCE UI ALWAYS SHOW LOGIN FIRST */
document.getElementById("login").classList.remove("hidden");
document.getElementById("hub").classList.add("hidden");

/* AUTH */
window.signup = async function () {
    try {
        await createUserWithEmailAndPassword(auth, email.value, pass.value);
    } catch (e) {
        msg.innerText = e.message;
    }
};

window.signin = async function () {
    try {
        await signInWithEmailAndPassword(auth, email.value, pass.value);
    } catch (e) {
        msg.innerText = e.message;
    }
};

/* AUTH STATE */
onAuthStateChanged(auth, (u) => {

    if (!u) return;

    document.getElementById("login").classList.add("hidden");
    document.getElementById("hub").classList.remove("hidden");

    setOnline(u);
    listenChat();
    listenOnline();

    if (ADMIN_EMAILS.includes(u.email)) {
        document.getElementById("adminPanel").classList.remove("hidden");
    }
});

/* CHAT */
window.send = async function () {
    if (!text.value) return;

    await addDoc(collection(db, "messages"), {
        user: auth.currentUser.email,
        text: text.value,
        time: Date.now()
    });

    text.value = "";
};

function listenChat() {
    onSnapshot(collection(db, "messages"), (snap) => {
        let html = "";
        snap.forEach(d => {
            let m = d.data();
            html += `<div class="msg"><b>${m.user}</b>: ${m.text}</div>`;
        });

        chat.innerHTML = html;
    });
}

/* ONLINE */
function setOnline(user) {
    setDoc(doc(db, "online", user.email), {
        time: Date.now()
    });

    setInterval(() => {
        setDoc(doc(db, "online", user.email), {
            time: Date.now()
        });
    }, 5000);
}

function listenOnline() {
    onSnapshot(collection(db, "online"), (snap) => {
        let html = "";
        snap.forEach(d => {
            html += `<div>${d.id}</div>`;
        });

        online.innerHTML = html;
    });
}

/* ADMIN */
window.clearChat = async function () {
    const snap = await getDocs(collection(db, "messages"));
    snap.forEach(d => deleteDoc(doc(db, "messages", d.id)));
};

window.wipeOnline = async function () {
    const snap = await getDocs(collection(db, "online"));
    snap.forEach(d => deleteDoc(doc(db, "online", d.id)));
};

</script>

</body>
</html>
