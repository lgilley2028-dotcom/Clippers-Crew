<!DOCTYPE html>
<html>

<head>
    <title>Clipper Crew // Backrooms Online</title>

    <style>
        body {
            margin: 0;
            font-family: monospace;
            background: #b8b15a;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                #b8b15a,
                #b8b15a 25px,
                #a59f50 25px,
                #a59f50 50px
            );
        }

        .hub {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            height: 100vh;
        }

        .panel {
            border: 1px solid black;
            background: rgba(0,0,0,0.15);
            padding: 10px;
            overflow-y: auto;
        }

        input, button {
            width: 90%;
            padding: 8px;
            margin-top: 5px;
            background: #111;
            color: #d6d06a;
            border: none;
        }

        .chatBox {
            height: 75vh;
            overflow-y: auto;
            border: 1px solid black;
            padding: 5px;
        }

        .hidden { display: none; }

        .msg { margin: 4px 0; }
    </style>
</head>

<body>

<div class="bg"></div>

<!-- LOGIN -->
<div id="login" style="text-align:center; margin-top:120px;">
    <h1>CLIPPER CREW</h1>

    <input id="email" placeholder="email"><br>
    <input id="pass" type="password" placeholder="password"><br>

    <button onclick="signup()">register</button>
    <button onclick="signin()">login</button>

    <p id="msg"></p>
</div>

<!-- HUB -->
<div id="hub" class="hub hidden">

    <!-- ONLINE -->
    <div class="panel">
        <h3>ONLINE</h3>
        <div id="online"></div>
    </div>

    <!-- CHAT -->
    <div class="panel">
        <h3>GLOBAL CHAT</h3>

        <div class="chatBox" id="chat"></div>

        <input id="text" placeholder="message">
        <button onclick="send()">send</button>
    </div>

    <!-- ADMIN -->
    <div id="adminPanel" class="panel hidden">
        <h3>ADMIN PANEL</h3>

        <button onclick="clearChat()">wipe chat</button>
        <button onclick="wipeOnline()">wipe online</button>

        <p style="font-size:12px;">admin active</p>
    </div>

</div>

<script type="module">
    console.log("SCRIPT LOADED");
    document.body.innerHTML = "<h1>JS IS WORKING</h1>";

</script>

</body>
</html>
